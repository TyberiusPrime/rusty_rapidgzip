[package]
edition = "2021"
rust-version = "1.80"
name = "zlib-rs-vendored"
version = "0.6.3"
publish = false
description = "Vendored zlib-rs 0.6.3 (Zlib license), modified for rapidgzip_rs marker support."
license = "Zlib"
readme = "README.md"

[features]
ZLIB_DEBUG = []
__internal-api = []
c-allocator = []
default = ["std", "c-allocator"]
rust-allocator = []
std = ["rust-allocator"]

[lib]
name = "zlib_rs_vendored"
path = "src/lib.rs"

[lints.rust]
unsafe_op_in_unsafe_fn = "deny"
